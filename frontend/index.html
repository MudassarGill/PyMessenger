<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyMessenger – Login</title>
  <meta name="description" content="PyMessenger - A fast, file-based messaging app. Login or register to start chatting." />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">💬</div>
      <h1>PyMessenger</h1>
      <p>Fast · Secure · Local</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Card -->
    <div class="card">
      <!-- Login Form -->
      <div class="form-section active" id="section-login">
        <h2>Welcome back 👋</h2>
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" />
        </div>
        <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">Sign In</button>
        <div class="alert" id="login-alert"></div>
      </div>

      <!-- Register Form -->
      <div class="form-section" id="section-register">
        <h2>Create account ✨</h2>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="Choose a unique username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="reg-displayname">Display Name</label>
          <input type="text" id="reg-displayname" placeholder="Your full name or nickname" autocomplete="name" />
        </div>
        <button class="btn btn-primary" id="btn-register" onclick="handleRegister()">Create Account</button>
        <div class="alert" id="register-alert"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    // Allow Enter key to submit
    document.getElementById('login-username').addEventListener('keyup', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('reg-username').addEventListener('keyup', e => {
      if (e.key === 'Enter') document.getElementById('reg-displayname').focus();
    });
    document.getElementById('reg-displayname').addEventListener('keyup', e => {
      if (e.key === 'Enter') handleRegister();
    });
  </script>
</body>
</html>
